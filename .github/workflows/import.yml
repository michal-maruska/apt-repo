name: Update Apt Repo
on:
  workflow_dispatch:
    inputs:
      bootstrap:
        description: 'Empty the pool!'
        type: boolean
        default: false

  repository_dispatch:
    types: [new-deb-package]


run-name: >-
  ${{ github.event_name == 'workflow_dispatch'
      && (inputs.bootstrap && 'Bootstrap' || 'Manual run')
      || format('Import: {0} {1}',
           github.event.client_payload.component,
           github.event.client_payload.version) }}


permissions:
  contents: write   # Needed to push the DB back to the branch
  pages: write      # Needed to upload the web artifact
  id-token: write   # Needed for the secure deployment handshake

concurrency:
  group: apt-repository
  cancel-in-progress: false

jobs:
  reprepro:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y reprepro git

      - name: Checkout Config (Main)
        uses: actions/checkout@v4
        with:
          path: main-source

      - name: Restore cache
        id: cache
        if: ${{ !inputs.bootstrap }}
        uses: actions/cache@v4
        with:
          path: |
            apt-data/pool
            apt-data/dists
            apt-data/db
          key: reprepro-${{ github.run_id }}
          restore-keys: |
                 reprepro-

      - name: Restore from release if cache missed
        if: steps.cache.outputs.cache-hit != 'true' && !inputs.bootstrap
        run: |
          gh release download reprepro-state \
            --pattern reprepro-state.tar.gz \
            --repo ${{ github.repository }} || true
          if [ -f reprepro-state.tar.gz ]; then
            tar xzf reprepro-state.tar.gz
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Sanitize Reprepro
        run: |
          ldd $(which reprepro) |grep libdb
          # Try to list references. If it fails (non-zero exit code), the DB is incompatible.
          if ! reprepro -b ./apt-data --confdir ./main-source/conf dumpreferences > /dev/null 2>&1; then
              echo "Database incompatible or corrupt. Rebuilding..."
              rm -rf ./apt-data/db
          fi

      - name: Import GPG Key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          # Fix for GPG in containers: avoid "Inappropriate ioctl for device"
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf

          # Decode and import
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import

          # Restart agent
          gpgconf --kill gpg-agent

          # huh?
          GPG_FINGERPRINT=$(gpg --list-secret-keys --with-colons | \
          awk -F: '/^fpr/{print $10; exit}')
          echo "$GPG_FINGERPRINT:6:" | gpg --import-ownertrust

      - name: Download New Package
        if: github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          mkdir -p incoming
          # Use the payload sent from your slave repo
          # Force gh to tell us what it's doing
          gh release download ${{ github.event.client_payload.version }} \
               --repo ${{ github.event.client_payload.repository }} \
               --dir ./incoming \
               --skip-existing

      - name: Run Reprepro
        if: github.event_name == 'repository_dispatch'
        run: |
          # Use config from main, but write data to apt-data folder
          reprepro -b ./apt-data \
                   --confdir ./main-source/conf \
                   include sid ./incoming/*.changes

      - name: Push to apt-storage
        working-directory: ./apt-data
        run: |
          git config --global user.name "Apt Robot"
          git config --global user.email "robot@example.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/apt-data"

          # Add the new pool files, dists metadata, and the updated DB
          git add .
          git commit -m "Add ${{ github.event.client_payload.repo }} version ${{ github.event.client_payload.version }}"
          git push origin apt-storage

      - name: Prepare apt-data for deployment
        run: |
          # Copy the public key into the root of the repo
          cp main-source/maruska.asc ./apt-data/
          echo "Debian repository" > ./apt-data/index.html

          # prevent GH from processing the files:
          touch ./apt-data/.nojekyll

          # CRITICAL: Remove the db folder so it isn't included in the Artifact
          # This only removes it from the local runner disk, not the git history
          rm -rf ./apt-data/db

      # 3. Upload exactly what is left in apt-data
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # should ignore .git !
          path: './apt-data' # Now contains dists, pool, public.key, and .nojekyll


  deploy: # This is your deployment job name
    needs: reprepro
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest # or debian:sid if you are using that
    steps:
      # ... your previous steps (upload, etc) ...
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

